---      
ARM_CLIENT_ID: ${{ secrets.ARM_CLIENT_ID }}
ARM_CLIENT_SECRET: ${{ secrets.ARM_CLIENT_SECRET }}
ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}
ARM_TENANT_ID: ${{ secrets.ARM_TENANT_ID }}
ARM_USE_AZUREAD: true 
 steps:
      - name: Checkout Code
        uses: actions/checkout@v4
 
      - name: Install Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false
          terraform_version: ${{ inputs.terraform_cli_version }}
 
      - name: Terraform Init
        run: |
          terraform \
          -chdir="${{ inputs.root_module_folder_relative_path }}" \
          init \
          -backend-config="resource_group_name=${{ vars.BACKEND_AZURE_RESOURCE_GROUP_NAME }}" \
          -backend-config="storage_account_name=${{ vars.BACKEND_AZURE_STORAGE_ACCOUNT_NAME }}" \
          -backend-config="container_name=${{ vars.BACKEND_AZURE_STORAGE_ACCOUNT_CONTAINER_NAME }}" \
          -backend-config="key=terraform.tfstate"
 
      - name: Terraform Plan
        id: plan
        run: |
          terraform \
          -chdir="${{ inputs.root_module_folder_relative_path }}" \
          plan \
          -input=false
 
      - name: Update Pull Request
        if: (success() || failure()) && github.event_name == 'pull_request'
        uses: actions/github-script@v6
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const output = `#### Terraform Plan 📖\`${{ steps.plan.outcome }}\`
 
            <details><summary>Run details</summary>
 
            The plan was a ${{ steps.plan.outcome }} see the action for more details.
 
            </details>
 
            *Pushed by: @${{ github.actor }}, Action: \`${{ github.event_name }}\`*`;
 
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: output
            })
name: Continuous Integration
on:
  workflow_call:
    inputs:
      root_module_folder_relative_path:
        description: 'Root Module Folder Relative Path'
        default: '.'
        type: string
      terraform_cli_version:
        description: 'Terraform CLI Version'
        default: 'latest'
        type: string
 
jobs:
  validate:
    name: Validate Terraform
    runs-on: ubuntu-latest
    environment: alz-mgmt-plan
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
 
      - name: Install Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false
          terraform_version: ${{ inputs.terraform_cli_version }}
 
      - name: Terraform Format Check
        run: |
          terraform \
          -chdir="${{ inputs.root_module_folder_relative_path }}" \
          fmt \
          -check
 
      - name: Terraform Init
        run: |
          terraform \
          -chdir="${{ inputs.root_module_folder_relative_path }}" \
          init \
          -backend=false
 
      - name: Terraform Validate
        run: |
          terraform \
          -chdir="${{ inputs.root_module_folder_relative_path }}" \
          validate
 
  plan:
    name: Validate Terraform Plan
    needs: validate
    runs-on: ubuntu-latest
    concurrency: mgmt-tfstate
    environment: alz-mgmt-plan
    permissions:
      contents: read
      pull-requests: write
    env:
 
